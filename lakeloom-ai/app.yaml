command: ['npm', 'run', 'start']
env:
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: sql-warehouse
  - name: LAKELOOM_AUDIO_VOLUME_PATH
    valueFrom: session-audio
  - name: LAKELOOM_SCREENSHOT_VOLUME_PATH
    valueFrom: screenshots
  - name: LAKELOOM_PHOTO_VOLUME_PATH
    valueFrom: screenshots
  - name: LAKELOOM_DOCUMENT_VOLUME_PATH
    valueFrom: documents
  - name: LAKEBASE_ENDPOINT
    valueFrom: postgres

  # ── Secret scope values (injected via platform valueFrom) ─────────────
  # The platform reads the secret value and injects it as an env var.
  # No SDK calls needed at runtime — eliminates the secrets-service error.

  # ZeroBus SPN credentials (server-side event streaming)
  - name: LAKELOOM_ZEROBUS_CLIENT_ID
    valueFrom: zerobus-client-id
  - name: LAKELOOM_ZEROBUS_CLIENT_SECRET
    valueFrom: zerobus-client-secret

  # Xcode SPN credentials (included in QR payload for iOS pairing)
  - name: LAKELOOM_XCODE_CLIENT_ID
    valueFrom: xcode-client-id
  - name: LAKELOOM_XCODE_CLIENT_SECRET
    valueFrom: xcode-client-secret

  # Infrastructure config (auto-provisioned by platform bootstrap)
  - name: LAKELOOM_WORKSPACE_URL
    valueFrom: workspace-url
  - name: LAKELOOM_ZEROBUS_ENDPOINT
    valueFrom: zerobus-endpoint
  - name: LAKELOOM_TARGET_TABLE_NAME
    valueFrom: target-table-name
  - name: LAKELOOM_ZEROBUS_STREAM_POOL_SIZE
    valueFrom: zerobus-stream-pool-size

  # Secret scope name (static value — used for diagnostics/logging only)
  - name: LAKELOOM_SECRET_SCOPE
    value: lakeloom_credentials
