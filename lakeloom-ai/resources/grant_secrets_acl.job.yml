# Job resource — configure secret scope for app SPN
# Runs the infra bundle's update-secrets-acls notebook.
# Triggered by deploy.sh after app registration.

resources:
  jobs:
    grant_secrets_acl:
      name: "[${bundle.target}] Update App SPN Secrets ACL"
      tags:
        project: ${var.tags_project}
        purpose: admin-action
        env: ${bundle.target}
      tasks:
        - task_key: update_secrets_acls
          notebook_task:
            notebook_path: /Users/matthew.giglia@databricks.com/lakeLoom/lakeloom-infra/src/admin_actions/update-secrets-acls
            base_parameters:
              secret_scope: ${var.secret_scope_name}
              principal: ""
              permission: READ
            source: WORKSPACE
          environment_key: Default
      environments:
        - environment_key: Default
          spec:
            client: "1"
      max_concurrent_runs: 1
