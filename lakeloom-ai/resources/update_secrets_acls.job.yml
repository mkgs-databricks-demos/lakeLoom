# Job resource — git-sourced notebook for updating secrets ACLs
# Grants the app SPN READ access on the secret scope.
# Called by configure_app_spn job via run_job_task.

resources:
  jobs:
    update_secrets_acls:
      name: "[${bundle.target}] Update Secrets ACLs"
      tags:
        project: ${var.tags_project}
        purpose: admin-action
        env: ${bundle.target}
      git_source:
        git_url: https://github.com/matthew-gigl-db/helper-notebooks
        git_provider: gitHub
        git_branch: main
      tasks:
        - task_key: update_secrets_acls
          notebook_task:
            notebook_path: Update Databricks Secrets ACLs
            base_parameters:
              secret_scope: ${var.secret_scope_name}
              principal: ${var.app_spn_id}
              permission: READ
            source: GIT
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: ${var.serverless_environment_version}
      max_concurrent_runs: 1
